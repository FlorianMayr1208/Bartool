openapi: 3.0.0
info:
  title: Bar Management API
  version: '0.1'
paths:
  /ingredients:
    get:
      summary: List ingredients
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
    post:
      summary: Create ingredient
  /recipes:
    get:
      summary: List locally stored recipes
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
    post:
      summary: Create a local recipe
  /recipes/{recipe_id}:
    get:
      summary: Get one local recipe
      parameters:
        - in: path
          name: recipe_id
          required: true
          schema:
            type: integer
    patch:
      summary: Update one local recipe
      parameters:
        - in: path
          name: recipe_id
          required: true
          schema:
            type: integer
    delete:
      summary: Delete one local recipe
      parameters:
        - in: path
          name: recipe_id
          required: true
          schema:
            type: integer
  /inventory/{id}:
    get:
      summary: Get inventory item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
  /synonyms:
    get:
      summary: List synonyms
    post:
      summary: Create synonym
  /synonyms/{alias}:
    delete:
      summary: Delete synonym
